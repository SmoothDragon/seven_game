<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Word Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <h1>Seven Word Game</h1>
            <p>Guess 7-letter words containing the common letter. Find all 7 secret words!</p>
            
            <div id="controls">
                <label for="difficulty">Difficulty: </label>
                <select id="difficulty">
                    <option value="beginner">Beginner (10k words)</option>
                    <option value="advanced">Advanced (30k words)</option>
                    <option value="expert">Expert (All words)</option>
                </select>
                <button id="new-game-btn">New Game</button>
            </div>

        <div class="game-header">
            <div id="common-letter-display">Common Letter: <span id="common-letter"></span></div>
            <div id="timer-display">Time: <span id="timer">00:00</span></div>
        </div>
        
        <div id="game-board">
                <!-- 7 rows for the 7 secret words -->
            </div>
            
            <div id="column-feedback">
                <!-- Red letters for each column -->
                <div class="col-feedback" id="col-0"></div>
                <div class="col-feedback" id="col-1"></div>
                <div class="col-feedback" id="col-2"></div>
                <div class="col-feedback" id="col-3"></div>
                <div class="col-feedback" id="col-4"></div>
                <div class="col-feedback" id="col-5"></div>
                <div class="col-feedback" id="col-6"></div>
            </div>

        <div class="input-area">
            <input type="text" id="guess-input" maxlength="7" placeholder="Enter 7-letter word" inputmode="none" autocomplete="off" spellcheck="false">
            <button id="guess-btn">Guess</button>
        </div>
            <div id="message"></div>
            
            <div id="keyboard">
                <div class="keyboard-row">
                    <button class="key" data-key="q">Q</button>
                    <button class="key" data-key="w">W</button>
                    <button class="key" data-key="e">E</button>
                    <button class="key" data-key="r">R</button>
                    <button class="key" data-key="t">T</button>
                    <button class="key" data-key="y">Y</button>
                    <button class="key" data-key="u">U</button>
                    <button class="key" data-key="i">I</button>
                    <button class="key" data-key="o">O</button>
                    <button class="key" data-key="p">P</button>
                </div>
                <div class="keyboard-row">
                    <button class="key" data-key="a">A</button>
                    <button class="key" data-key="s">S</button>
                    <button class="key" data-key="d">D</button>
                    <button class="key" data-key="f">F</button>
                    <button class="key" data-key="g">G</button>
                    <button class="key" data-key="h">H</button>
                    <button class="key" data-key="j">J</button>
                    <button class="key" data-key="k">K</button>
                    <button class="key" data-key="l">L</button>
                </div>
                <div class="keyboard-row">
                    <button class="key wide" data-key="Enter">ENTER</button>
                    <button class="key" data-key="z">Z</button>
                    <button class="key" data-key="x">X</button>
                    <button class="key" data-key="c">C</button>
                    <button class="key" data-key="v">V</button>
                    <button class="key" data-key="b">B</button>
                    <button class="key" data-key="n">N</button>
                    <button class="key" data-key="m">M</button>
                    <button class="key wide" data-key="Backspace">⌫</button>
                </div>
            </div>
        </div>

        <div class="sidebar history">
            <h3>Guess History</h3>
            <ul id="guess-history"></ul>
        </div>
    </div>

    <script src="words.js"></script>
    <script src="script.js"></script>
</body>
</html>
